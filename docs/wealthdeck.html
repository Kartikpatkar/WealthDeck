<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>WealthDeck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-primary:#0a0e17;
  --bg-surface:rgba(255,255,255,0.05);
  --bg-surface-elevated:rgba(255,255,255,0.08);
  --color-primary:#6366f1;
  --color-accent:#22d3ee;
  --color-income:#34d399;
  --color-expense:#f87171;
  --color-transfer:#60a5fa;
  --color-warning:#fbbf24;
  --text-primary:#f1f5f9;
  --text-secondary:#94a3b8;
  --border:rgba(255,255,255,0.1);
  --radius-lg:20px;
  --radius-md:16px;
  --radius-sm:12px;
}
[data-theme="light"]{
  --bg-primary:#f4f6fb;
  --bg-surface:rgba(15,23,42,0.04);
  --bg-surface-elevated:rgba(15,23,42,0.07);
  --text-primary:#0f172a;
  --text-secondary:#5b6478;
  --border:rgba(15,23,42,0.09);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  transition:background .3s ease,color .3s ease;
  -webkit-tap-highlight-color:transparent;
  padding-top:env(safe-area-inset-top);
}
.mono{font-family:'JetBrains Mono',monospace;}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit;}
input,select{font-family:inherit;color:inherit;}
::-webkit-scrollbar{width:0;height:0;}

/* ---------- App shell ---------- */
.app{display:flex;min-height:100vh;}

/* Sidebar (tablet icon-only / desktop full) */
.sidebar{
  display:none;
  flex-direction:column;
  gap:4px;
  width:76px;
  padding:20px 12px;
  border-right:1px solid var(--border);
  background:var(--bg-surface);
  backdrop-filter:blur(16px);
  position:sticky;top:0;height:100vh;
  flex-shrink:0;
  transition:width .25s ease;
}
.sidebar .brand{display:flex;align-items:center;gap:10px;padding:8px 8px 24px;overflow:hidden;white-space:nowrap;}
.sidebar .brand .mark{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--color-primary),var(--color-accent));flex-shrink:0;}
.sidebar .brand span{font-weight:700;font-size:16px;opacity:0;transition:opacity .2s;}
.sidebar .nav-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 10px;border-radius:12px;
  color:var(--text-secondary);font-size:14px;font-weight:500;
  white-space:nowrap;overflow:hidden;
}
.sidebar .nav-item svg{flex-shrink:0;width:20px;height:20px;}
.sidebar .nav-item span{opacity:0;transition:opacity .2s;}
.sidebar .nav-item.active{background:var(--bg-surface-elevated);color:var(--text-primary);}
.sidebar .nav-item.active svg{color:var(--color-primary);}
.sidebar .nav-item:hover{background:var(--bg-surface-elevated);color:var(--text-primary);}
.sidebar .spacer{flex:1;}

@media (min-width:768px){
  .sidebar{display:flex;}
}
@media (min-width:1024px){
  .sidebar{width:236px;}
  .sidebar .brand span,.sidebar .nav-item span{opacity:1;}
}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  display:none;
  align-items:center;justify-content:space-between;
  padding:20px 32px;border-bottom:1px solid var(--border);
}
@media (min-width:768px){.topbar{display:flex;}}
.topbar h1{font-size:20px;font-weight:700;}
.topbar-actions{display:flex;align-items:center;gap:12px;}

.content{
  flex:1;padding:16px 16px 100px;
  max-width:1400px;width:100%;margin:0 auto;
}
@media (min-width:768px){.content{padding:24px 32px 40px;}}
@media (min-width:1024px){.content{padding:32px 40px 48px;}}

/* ---------- Bottom nav (mobile) ---------- */
.bottom-nav{
  position:fixed;left:12px;right:12px;bottom:12px;
  display:flex;align-items:center;justify-content:space-around;
  background:var(--bg-surface-elevated);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:24px;
  padding:8px 6px;
  padding-bottom:calc(8px + env(safe-area-inset-bottom));
  z-index:40;
}
@media (min-width:768px){.bottom-nav{display:none;}}
.bottom-nav button{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 10px;border-radius:14px;color:var(--text-secondary);
  font-size:10px;font-weight:600;min-width:48px;min-height:48px;justify-content:center;
  transition:transform .15s ease;
}
.bottom-nav button.active{color:var(--color-primary);}
.bottom-nav button:active{transform:scale(.9);}
.bottom-nav svg{width:22px;height:22px;}
.fab{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--color-primary),#818cf8);
  display:flex;align-items:center;justify-content:center;
  margin-top:-30px;
  box-shadow:0 8px 24px rgba(99,102,241,.5);
  flex-shrink:0;
  transition:transform .15s ease;
}
.fab:active{transform:scale(.88);}
.fab svg{width:26px;height:26px;color:#fff;}
.fab-desktop{
  display:none;
  position:fixed;bottom:32px;right:32px;
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,var(--color-primary),#818cf8);
  align-items:center;justify-content:center;
  box-shadow:0 10px 30px rgba(99,102,241,.45);
  z-index:30;transition:transform .15s ease;
}
.fab-desktop:hover{transform:scale(1.06);}
.fab-desktop svg{width:26px;height:26px;color:#fff;}
@media (min-width:768px){.fab-desktop{display:flex;}}

/* ---------- Cards / glass ---------- */
.card{
  background:var(--bg-surface);
  backdrop-filter:blur(16px);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:20px;
}
.section-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.section-title .link{font-size:13px;color:var(--color-primary);font-weight:600;}

/* Balance hero */
.balance-card{
  position:relative;overflow:hidden;
  border-radius:24px;padding:26px 24px;
  background:radial-gradient(120% 140% at 15% 0%, rgba(99,102,241,0.35), transparent 60%),
             radial-gradient(120% 140% at 100% 100%, rgba(34,211,238,0.25), transparent 55%),
             var(--bg-surface);
  border:1px solid var(--border);
  isolation:isolate;
}
.balance-card::before{
  content:'';position:absolute;inset:-2px;border-radius:26px;padding:2px;z-index:-1;
  background:conic-gradient(from var(--ang,0deg),var(--color-primary),var(--color-accent),var(--color-income),var(--color-primary));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  opacity:.55;animation:spin 8s linear infinite;
}
@keyframes spin{to{--ang:360deg;}}
@property --ang{syntax:'<angle>';inherits:false;initial-value:0deg;}
.balance-card .label{font-size:13px;color:var(--text-secondary);font-weight:500;margin-bottom:6px;}
.balance-card .amount{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:clamp(32px,7vw,48px);letter-spacing:-1px;}
.balance-card .amount .cents{font-size:.55em;color:var(--text-secondary);}
.balance-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
.pill{
  display:flex;align-items:center;gap:6px;
  background:var(--bg-surface-elevated);border:1px solid var(--border);
  border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;
}
.pill svg{width:14px;height:14px;}

/* stat cards */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
@media (min-width:1024px){.stats-grid{grid-template-columns:1fr 1fr;}}
.stat-card{border-radius:var(--radius-md);padding:16px;background:var(--bg-surface);border:1px solid var(--border);}
.stat-card .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.stat-card .icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.stat-card .icon svg{width:16px;height:16px;}
.stat-card.income .icon{background:rgba(52,211,153,.15);color:var(--color-income);}
.stat-card.expense .icon{background:rgba(248,113,113,.15);color:var(--color-expense);}
.stat-card .amt{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;}
.stat-card .lbl{font-size:12px;color:var(--text-secondary);margin-top:2px;}

/* dashboard grid layout */
.dash-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:16px;}
@media (min-width:768px){.dash-grid{grid-template-columns:1fr 1fr;}}
@media (min-width:1024px){.dash-grid{grid-template-columns:1.1fr 1fr 1fr;}}

/* donut */
.donut-wrap{display:flex;align-items:center;gap:20px;}
.donut{width:120px;height:120px;border-radius:50%;flex-shrink:0;position:relative;}
.donut::after{content:'';position:absolute;inset:16px;border-radius:50%;background:var(--bg-primary);transition:background .3s;}
[data-theme="light"] .donut::after{background:#f4f6fb;}
.donut-center{position:absolute;inset:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-center .v{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;}
.donut-center .t{font-size:9px;color:var(--text-secondary);}
.legend{display:flex;flex-direction:column;gap:8px;flex:1;}
.legend-row{display:flex;align-items:center;gap:8px;font-size:12px;}
.legend-row .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-row .name{flex:1;color:var(--text-secondary);}
.legend-row .val{font-family:'JetBrains Mono',monospace;font-weight:600;}

/* transactions */
.tx-row{
  display:flex;align-items:center;gap:12px;padding:12px 4px;
  border-bottom:1px solid var(--border);
}
.tx-row:last-child{border-bottom:none;}
.tx-icon{width:40px;height:40px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;}
.tx-info{flex:1;min-width:0;}
.tx-info .m{font-size:14px;font-weight:600;}
.tx-info .c{font-size:12px;color:var(--text-secondary);}
.tx-amt{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;white-space:nowrap;}
.tx-amt.income{color:var(--color-income);}
.tx-amt.expense{color:var(--color-expense);}
.date-header{font-size:12px;font-weight:600;color:var(--text-secondary);padding:14px 4px 6px;text-transform:uppercase;letter-spacing:.04em;}

/* filter chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:6px;}
.chip{
  flex-shrink:0;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;
  background:var(--bg-surface);border:1px solid var(--border);color:var(--text-secondary);white-space:nowrap;
}
.chip.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary);}

/* search */
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--bg-surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;
}
.search-bar svg{width:17px;height:17px;color:var(--text-secondary);flex-shrink:0;}
.search-bar input{background:none;border:none;outline:none;font-size:14px;width:100%;color:var(--text-primary);}

/* budgets */
.budget-item{margin-bottom:16px;}
.budget-item:last-child{margin-bottom:0;}
.budget-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.budget-top .name{font-weight:600;display:flex;align-items:center;gap:8px;}
.budget-top .amt{color:var(--text-secondary);font-family:'JetBrains Mono',monospace;font-size:12px;}
.bar-track{height:8px;border-radius:99px;background:var(--bg-surface-elevated);overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .6s ease;}

/* accounts */
.accounts-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media (min-width:640px){.accounts-grid{grid-template-columns:1fr 1fr;}}
@media (min-width:1024px){.accounts-grid{grid-template-columns:1fr 1fr 1fr;}}
.account-card{border-radius:var(--radius-md);padding:18px;position:relative;overflow:hidden;border:1px solid var(--border);}
.account-card .strip{position:absolute;left:0;top:0;bottom:0;width:5px;}
.account-card .type{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.account-card .name{font-size:15px;font-weight:600;margin-bottom:14px;}
.account-card .bal{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;}

/* page header row */
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.page-head h2{font-size:19px;font-weight:700;}
@media (min-width:768px){.page-head{display:none;}}

/* screens */
.screen{display:none;}
.screen.active{display:block;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;justify-content:center;z-index:100;
}
.modal-overlay.open{display:flex;}
@media (min-width:768px){.modal-overlay{align-items:center;}}
.modal{
  width:100%;max-width:480px;
  background:var(--bg-primary);
  border:1px solid var(--border);
  border-radius:24px 24px 0 0;
  padding:14px 20px 24px;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,.72,0,1);
  max-height:90vh;overflow-y:auto;
  padding-bottom:calc(24px + env(safe-area-inset-bottom));
}
.modal-overlay.open .modal{transform:translateY(0);}
@media (min-width:768px){
  .modal{border-radius:24px;max-height:85vh;}
}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:2px auto 14px;}
@media (min-width:768px){.modal-handle{display:none;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-head h3{font-size:17px;font-weight:700;}
.modal-close{width:32px;height:32px;border-radius:10px;background:var(--bg-surface);display:flex;align-items:center;justify-content:center;}
.modal-close svg{width:16px;height:16px;}

.segmented{display:flex;background:var(--bg-surface);border-radius:14px;padding:4px;margin-bottom:22px;}
.segmented button{flex:1;padding:9px;border-radius:11px;font-size:13px;font-weight:600;color:var(--text-secondary);}
.segmented button.active{background:var(--color-primary);color:#fff;}

.amount-input-wrap{text-align:center;margin-bottom:24px;}
.amount-input-wrap .cur{font-size:20px;color:var(--text-secondary);vertical-align:top;position:relative;top:8px;margin-right:2px;}
.amount-input{
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:44px;
  background:none;border:none;outline:none;width:100%;text-align:center;color:var(--text-primary);
}
.amount-input.expense-mode{color:var(--color-expense);}
.amount-input.income-mode{color:var(--color-income);}

.field{margin-bottom:14px;}
.field label{font-size:12px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:6px;}
.field select,.field input[type=text],.field input[type=date]{
  width:100%;background:var(--bg-surface-elevated);border:1px solid transparent;
  border-radius:13px;padding:13px 14px;font-size:14px;outline:none;transition:border-color .15s;
}
.field select:focus,.field input:focus{border-color:var(--color-primary);}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}

.more-toggle{
  display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--color-primary);
  margin:6px 0 16px;
}
.more-fields{display:none;}
.more-fields.open{display:block;}

.save-btn{
  width:100%;background:linear-gradient(135deg,var(--color-primary),#818cf8);
  color:#fff;font-weight:700;font-size:15px;padding:15px;border-radius:16px;
  box-shadow:0 8px 20px rgba(99,102,241,.35);
}
.save-btn:active{transform:scale(.98);}

.svg-icon{width:18px;height:18px;}

/* theme toggle top bar */
.icon-btn{width:36px;height:36px;border-radius:11px;background:var(--bg-surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
.icon-btn svg{width:17px;height:17px;}

/* empty */
.hint{font-size:12px;color:var(--text-secondary);text-align:center;padding:14px 0;}
</style>
</head>
<body data-theme="dark">

<div class="app">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="brand"><div class="mark"></div><span>WealthDeck</span></div>
    <button class="nav-item active" data-screen="dashboard" onclick="goScreen('dashboard',this)">
      <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="16" width="7" height="5" rx="2"/></svg>
      <span>Dashboard</span>
    </button>
    <button class="nav-item" data-screen="transactions" onclick="goScreen('transactions',this)">
      <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
      <span>Transactions</span>
    </button>
    <button class="nav-item" data-screen="budgets" onclick="goScreen('budgets',this)">
      <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 000 4h4v-4h-4z"/></svg>
      <span>Budgets</span>
    </button>
    <button class="nav-item" data-screen="accounts" onclick="goScreen('accounts',this)">
      <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
      <span>Accounts</span>
    </button>
    <div class="spacer"></div>
    <button class="nav-item" onclick="toggleTheme()">
      <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
      <span>Theme</span>
    </button>
  </nav>

  <div class="main">
    <div class="topbar">
      <h1 id="topbar-title">Dashboard</h1>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="toggleTheme()" aria-label="Toggle theme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
        </button>
        <button class="icon-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>
      </div>
    </div>

    <div class="content">

      <!-- ===== DASHBOARD ===== -->
      <section class="screen active" id="screen-dashboard">
        <div class="page-head"><h2>Dashboard</h2></div>

        <div class="balance-card">
          <div class="label">Total balance</div>
          <div class="amount"><span class="cur">$</span><span id="balanceNum">0</span><span class="cents">.42</span></div>
          <div class="balance-row">
            <div class="pill" style="color:var(--color-income)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>Up 8.2% this month</div>
            <div class="pill">6 accounts</div>
          </div>
        </div>

        <div class="dash-grid">
          <div>
            <div class="stats-grid">
              <div class="stat-card income">
                <div class="top"><span style="font-size:12px;color:var(--text-secondary);font-weight:600">Income</span><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg></div></div>
                <div class="amt">$4,820</div>
                <div class="lbl">This month</div>
              </div>
              <div class="stat-card expense">
                <div class="top"><span style="font-size:12px;color:var(--text-secondary);font-weight:600">Expense</span><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg></div></div>
                <div class="amt">$2,145</div>
                <div class="lbl">This month</div>
              </div>
            </div>

            <div class="card" style="margin-top:16px;">
              <div class="section-title">Recent activity<span class="link" onclick="goScreen('transactions')">See all</span></div>
              <div id="recentTxList"></div>
            </div>
          </div>

          <div class="card">
            <div class="section-title">Spending breakdown</div>
            <div class="donut-wrap">
              <div class="donut" id="donutChart">
                <div class="donut-center"><div class="v">$2,145</div><div class="t">spent</div></div>
              </div>
              <div class="legend" id="donutLegend"></div>
            </div>
          </div>

          <div class="card">
            <div class="section-title">Top budgets<span class="link" onclick="goScreen('budgets')">Manage</span></div>
            <div id="miniBudgets"></div>
          </div>
        </div>
      </section>

      <!-- ===== TRANSACTIONS ===== -->
      <section class="screen" id="screen-transactions">
        <div class="page-head"><h2>Transactions</h2></div>
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" placeholder="Search merchant, category, notes">
        </div>
        <div class="chips">
          <button class="chip active">All accounts</button>
          <button class="chip">Food & dining</button>
          <button class="chip">Transport</button>
          <button class="chip">Shopping</button>
          <button class="chip">Bills</button>
          <button class="chip">This month</button>
        </div>
        <div class="card" style="padding:8px 20px;">
          <div id="fullTxList"></div>
        </div>
      </section>

      <!-- ===== BUDGETS ===== -->
      <section class="screen" id="screen-budgets">
        <div class="page-head"><h2>Budgets</h2></div>
        <div class="card">
          <div class="section-title">July 2026</div>
          <div id="fullBudgets"></div>
        </div>
      </section>

      <!-- ===== ACCOUNTS ===== -->
      <section class="screen" id="screen-accounts">
        <div class="page-head"><h2>Accounts</h2></div>
        <div class="accounts-grid" id="accountsGrid"></div>
      </section>

    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="active" data-screen="dashboard" onclick="goScreen('dashboard',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="16" width="7" height="5" rx="2"/></svg>
    Home
  </button>
  <button data-screen="transactions" onclick="goScreen('transactions',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
    Activity
  </button>
  <button class="fab" onclick="openModal()" aria-label="Add transaction">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <button data-screen="budgets" onclick="goScreen('budgets',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 000 4h4v-4h-4z"/></svg>
    Budgets
  </button>
  <button data-screen="accounts" onclick="goScreen('accounts',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
    More
  </button>
</nav>

<button class="fab-desktop" onclick="openModal()" aria-label="Add transaction">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
</button>

<!-- ADD TRANSACTION MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <h3>Add transaction</h3>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="segmented" id="typeSeg">
      <button class="active" data-type="expense" onclick="setTxType('expense',this)">Expense</button>
      <button data-type="income" onclick="setTxType('income',this)">Income</button>
      <button data-type="transfer" onclick="setTxType('transfer',this)">Transfer</button>
    </div>

    <div class="amount-input-wrap">
      <span class="cur">$</span><input class="amount-input expense-mode" id="amountInput" inputmode="decimal" placeholder="0.00">
    </div>

    <div class="field">
      <label>Category</label>
      <select>
        <option>Food & dining</option>
        <option>Transport</option>
        <option>Shopping</option>
        <option>Bills & utilities</option>
        <option>Entertainment</option>
      </select>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Account</label>
        <select>
          <option>HDFC Savings</option>
          <option>Cash wallet</option>
          <option>Credit card</option>
        </select>
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" value="2026-07-18">
      </div>
    </div>

    <button class="more-toggle" onclick="toggleMore(this)">
      <span>More details</span>
      <svg class="svg-icon" style="width:14px;height:14px;transition:transform .2s" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="more-fields" id="moreFields">
      <div class="field"><label>Merchant</label><input type="text" placeholder="Start typing to search"></div>
      <div class="field"><label>Tags</label><input type="text" placeholder="Add tags separated by comma"></div>
      <div class="field"><label>Notes</label><input type="text" placeholder="Add a note"></div>
    </div>

    <button class="save-btn" onclick="closeModal()">Save transaction</button>
  </div>
</div>

<script>
var transactions=[
  {m:"Blue Bottle Coffee",c:"Food & dining",a:-6.5,icon:"☕",color:"var(--color-expense)",date:"Today"},
  {m:"Salary — Acme Corp",c:"Income",a:4200,icon:"💼",color:"var(--color-income)",date:"Today"},
  {m:"Uber",c:"Transport",a:-18.4,icon:"🚗",color:"var(--color-expense)",date:"Today"},
  {m:"Whole Foods",c:"Groceries",a:-84.12,icon:"🛒",color:"var(--color-expense)",date:"Yesterday"},
  {m:"Netflix",c:"Entertainment",a:-15.99,icon:"🎬",color:"var(--color-expense)",date:"Yesterday"},
  {m:"Transfer to Savings",c:"Transfer",a:-500,icon:"🔁",color:"var(--color-transfer)",date:"Jul 16"},
  {m:"Freelance payment",c:"Income",a:620,icon:"💰",color:"var(--color-income)",date:"Jul 15"},
  {m:"Spotify",c:"Entertainment",a:-10.99,icon:"🎧",color:"var(--color-expense)",date:"Jul 15"},
  {m:"Rent",c:"Bills & utilities",a:-1450,icon:"🏠",color:"var(--color-expense)",date:"Jul 12"},
  {m:"Gym membership",c:"Health",a:-42,icon:"💪",color:"var(--color-expense)",date:"Jul 12"}
];

function txRow(t){
  var isIncome=t.a>0;
  return '<div class="tx-row"><div class="tx-icon" style="background:'+(isIncome?'rgba(52,211,153,.15)':'rgba(148,163,184,.12)')+'">'+t.icon+'</div>'+
    '<div class="tx-info"><div class="m">'+t.m+'</div><div class="c">'+t.c+'</div></div>'+
    '<div class="tx-amt '+(isIncome?'income':'expense')+'">'+(isIncome?'+':'-')+'$'+Math.abs(t.a).toFixed(2)+'</div></div>';
}
document.getElementById('recentTxList').innerHTML=transactions.slice(0,5).map(txRow).join('');

var grouped={};
transactions.forEach(function(t){(grouped[t.date]=grouped[t.date]||[]).push(t);});
var fullHtml='';
Object.keys(grouped).forEach(function(d){
  fullHtml+='<div class="date-header">'+d+'</div>'+grouped[d].map(txRow).join('');
});
document.getElementById('fullTxList').innerHTML=fullHtml;

var budgetData=[
  {name:"Food & dining",spent:420,limit:500,color:"var(--color-warning)"},
  {name:"Transport",spent:120,limit:300,color:"var(--color-income)"},
  {name:"Shopping",spent:610,limit:400,color:"var(--color-expense)"},
  {name:"Entertainment",spent:60,limit:150,color:"var(--color-income)"},
  {name:"Bills & utilities",spent:1450,limit:1500,color:"var(--color-warning)"}
];
function budgetRow(b){
  var pct=Math.min(100,Math.round(b.spent/b.limit*100));
  return '<div class="budget-item"><div class="budget-top"><div class="name">'+b.name+'</div><div class="amt">$'+b.spent+' / $'+b.limit+'</div></div>'+
    '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+b.color+'"></div></div></div>';
}
document.getElementById('miniBudgets').innerHTML=budgetData.slice(0,3).map(budgetRow).join('');
document.getElementById('fullBudgets').innerHTML=budgetData.map(budgetRow).join('');

var donutSlices=[
  {name:"Bills",val:1450,color:"#6366f1"},
  {name:"Shopping",val:610,color:"#f87171"},
  {name:"Food",val:420,color:"#fbbf24"},
  {name:"Other",val:200,color:"#34d399"}
];
var total=donutSlices.reduce((s,x)=>s+x.val,0);
var acc=0,gradParts=[];
donutSlices.forEach(function(s){
  var start=acc/total*360,end=(acc+s.val)/total*360;
  gradParts.push(s.color+' '+start+'deg '+end+'deg');
  acc+=s.val;
});
document.getElementById('donutChart').style.background='conic-gradient('+gradParts.join(',')+')';
document.getElementById('donutLegend').innerHTML=donutSlices.map(function(s){
  return '<div class="legend-row"><div class="dot" style="background:'+s.color+'"></div><div class="name">'+s.name+'</div><div class="val">$'+s.val+'</div></div>';
}).join('');

var accounts=[
  {name:"HDFC Savings",type:"Bank",bal:8420.11,color:"#6366f1"},
  {name:"Cash Wallet",type:"Cash",bal:210.0,color:"#34d399"},
  {name:"ICICI Credit Card",type:"Credit",bal:-540.32,color:"#f87171"},
  {name:"Zerodha",type:"Investment",bal:15320.9,color:"#22d3ee"},
  {name:"PayPal",type:"Wallet",bal:96.4,color:"#60a5fa"},
  {name:"Emergency Fund",type:"Savings",bal:5000.0,color:"#fbbf24"}
];
document.getElementById('accountsGrid').innerHTML=accounts.map(function(a){
  return '<div class="account-card" style="background:var(--bg-surface)"><div class="strip" style="background:'+a.color+'"></div>'+
    '<div class="type">'+a.type+'</div><div class="name">'+a.name+'</div>'+
    '<div class="bal" style="color:'+(a.bal<0?'var(--color-expense)':'var(--text-primary)')+'">'+(a.bal<0?'-':'')+'$'+Math.abs(a.bal).toLocaleString(undefined,{minimumFractionDigits:2})+'</div></div>';
}).join('');

function goScreen(name,el){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('[data-screen]').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('[data-screen="'+name+'"]').forEach(b=>b.classList.add('active'));
  var titles={dashboard:"Dashboard",transactions:"Transactions",budgets:"Budgets",accounts:"Accounts"};
  document.getElementById('topbar-title').textContent=titles[name];
  window.scrollTo(0,0);
}

function openModal(){document.getElementById('modalOverlay').classList.add('open');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

function setTxType(type,el){
  document.querySelectorAll('#typeSeg button').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  var input=document.getElementById('amountInput');
  input.classList.remove('income-mode','expense-mode');
  input.classList.add(type==='income'?'income-mode':(type==='expense'?'expense-mode':''));
}

function toggleMore(el){
  var f=document.getElementById('moreFields');
  f.classList.toggle('open');
  el.querySelector('svg').style.transform=f.classList.contains('open')?'rotate(180deg)':'rotate(0deg)';
}

function toggleTheme(){
  var b=document.body;
  b.setAttribute('data-theme',b.getAttribute('data-theme')==='dark'?'light':'dark');
}

/* count-up balance */
(function(){
  var target=28640.42,el=document.getElementById('balanceNum'),start=null,dur=1100;
  function step(ts){
    if(!start)start=ts;
    var p=Math.min(1,(ts-start)/dur);
    var eased=1-Math.pow(1-p,3);
    el.textContent=Math.floor(eased*target).toLocaleString();
    if(p<1)requestAnimationFrame(step);
    else el.textContent=Math.floor(target).toLocaleString();
  }
  requestAnimationFrame(step);
})();
</script>
</body>
</html>
