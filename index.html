<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e17">
  
  <title>WealthDeck</title>
  
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/pages.css">
  
  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  
  <!-- JS -->
  <script type="module" src="./js/app.js"></script>
</head>
<body>
  <div id="app-container" class="app">
    <!-- Desktop Sidebar (Hidden on mobile) -->
    <nav class="sidebar" id="sidebar-nav">
      <!-- Injected by router.js -->
    </nav>

    <!-- Main Content Area -->
    <div class="main">
      <div class="topbar">
        <h1 id="topbar-title">WealthDeck</h1>
        <div class="topbar-actions" id="topbar-actions">
          <button class="icon-btn" onclick="window.app.toggleTheme()" aria-label="Toggle theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
          </button>
        </div>
      </div>
      
      <div class="content" id="main-content">
        <!-- Dynamic page content rendered here -->
      </div>
    </div>
  </div>
  
  <!-- Mobile Bottom Navigation (Hidden on desktop) -->
  <nav id="bottom-nav" class="bottom-nav"></nav>
  
  <!-- Desktop FAB -->
  <button class="fab-desktop" onclick="location.hash='#/transaction/new'" aria-label="Add transaction">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  
  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>
  
  <!-- Modal Container -->
  <div id="modal-container" class="modal-container"></div>
</body>
</html>
